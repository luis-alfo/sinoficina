name: Airtable Music DB

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - full-setup
          - provision-schema
          - cleanup-default
          - seed-genres
          - sync-artists
          - seed-albums
          - seed-songs
          - fetch-spotify-images
          - fetch-artist-images
          - fetch-album-covers
          - fetch-schema
          - add-record
          - list-records
          - delete-records
      table:
        description: 'Table name (for add/list/delete)'
        required: false
        type: string
        default: '-'
      data:
        description: 'JSON data (for add/delete)'
        required: false
        type: string
        default: '-'
  schedule:
    - cron: '0 9 * * 1-5'

env:
  AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
  AIRTABLE_BASE_ID: appGiSPPxrhb0LXYe
  SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
  SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
  PYTHONPATH: ${{ github.workspace }}/airtable-music/scripts

permissions:
  contents: write

jobs:
  airtable:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airtable-music/scripts
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # === SETUP ACTIONS ===

      - name: Full Setup
        if: github.event.inputs.action == 'full-setup'
        run: python full_setup.py

      - name: Provision Schema
        if: github.event.inputs.action == 'provision-schema'
        run: python provision_schema.py

      - name: Cleanup Default Table
        if: github.event.inputs.action == 'cleanup-default'
        run: python cleanup_default.py

      # === SEED ACTIONS ===

      - name: Seed Genres
        if: github.event.inputs.action == 'seed-genres'
        run: python -c "from seed_data import seed_genres; seed_genres()"

      - name: Sync Warner Artists
        if: github.event.inputs.action == 'sync-artists'
        run: python sync_warner_artists.py

      - name: Seed Albums
        if: github.event.inputs.action == 'seed-albums'
        run: python -c "from seed_data import seed_albums; seed_albums()"

      - name: Seed Songs
        if: github.event.inputs.action == 'seed-songs'
        run: python seed_songs.py

      # === SPOTIFY ===

      - name: Fetch Spotify Images (all)
        if: github.event.inputs.action == 'fetch-spotify-images'
        run: python fetch_spotify_images.py all

      - name: Fetch Artist Images
        if: github.event.inputs.action == 'fetch-artist-images'
        run: python fetch_spotify_images.py artists

      - name: Fetch Album Covers
        if: github.event.inputs.action == 'fetch-album-covers'
        run: python fetch_spotify_images.py albums

      # === FETCH ===

      - name: Fetch Schema
        if: github.event.inputs.action == 'fetch-schema' || github.event_name == 'schedule'
        run: python fetch_base_schema.py

      - name: Upload schema artifact
        if: github.event.inputs.action == 'fetch-schema' || github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: airtable-schema
          path: airtable-music/schemas/airtable_current_schema.json

      - name: Commit schema changes
        if: github.event.inputs.action == 'fetch-schema' || github.event_name == 'schedule'
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add airtable-music/schemas/
          git diff --staged --quiet || git commit -m "chore: update Airtable schema snapshot"
          git push

      # === CRUD ACTIONS ===

      - name: Add Record
        if: github.event.inputs.action == 'add-record'
        run: python crud_operations.py add '${{ github.event.inputs.table }}' '${{ github.event.inputs.data }}'

      - name: List Records
        if: github.event.inputs.action == 'list-records'
        run: python crud_operations.py list '${{ github.event.inputs.table }}'

      - name: Delete Records
        if: github.event.inputs.action == 'delete-records'
        run: python crud_operations.py delete '${{ github.event.inputs.table }}' '${{ github.event.inputs.data }}'
